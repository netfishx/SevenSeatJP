type: rental
title: { ja: '富士山周辺2日レンタル', zh: '富士山周边 2 日租车' }
durations:
  - label: { ja: '2日 (24時間 × 2)', zh: '2 天 (24 小时 × 2)' }
    hours: 48
    fares:
      - vehicle: alphard
        jpy: 88000
        includes: { ja: '保険・ETC込み', zh: '含保险·ETC' }
      - vehicle: hiace
        jpy: 96000
        includes: { ja: '7名様まで', zh: '最多 7 人' }
inclusions:
  - { ja: '基本保険込み', zh: '含基本保险' }
  - { ja: 'ETCカード付', zh: '附 ETC 卡' }
  - { ja: 'チャイルドシート無料', zh: '免费儿童座椅' }
excludeRegions:
  ja: '北海道・沖縄エリアは対応不可'
  zh: '北海道·冲绳地区不支持'
notes:
  ja: '国際免許またはオフィシャル翻訳が必要'
  zh: '需国际驾照或官方翻译件'
spine:
  type: checklist
  groups:
    - category: { ja: '必要書類', zh: '必备证件' }
      items:
        - label: { ja: '国際運転免許証 (IDP)', zh: '国际驾照(IDP)' }
          notes:
            ja: 'ジュネーブ条約加盟国発行のもの。中国大陸発行は不可。'
            zh: '需为《日内瓦公约》成员国签发。中国大陆签发的不可使用。'
        - label: { ja: '本国免許 + 公式日本語翻訳', zh: '原国驾照 + 官方日语翻译' }
          notes:
            ja: 'JAF・SOFA・各国大使館発行の翻訳のみ有効。中国大陸の方はこちらの方式が一般的です。'
            zh: '限 JAF / SOFA / 大使馆出具的翻译。中国大陆客户多采用此方式。'
        - label: { ja: 'パスポート', zh: '护照' }
    - category: { ja: '事前準備', zh: '事前准备' }
      items:
        - label: { ja: 'ETC カード貸出のご希望有無', zh: '是否需要租借 ETC 卡' }
        - label: { ja: 'チャイルドシート利用人数', zh: '儿童座椅使用人数' }
        - label: { ja: '禁煙・喫煙のご希望', zh: '禁烟·吸烟偏好' }
    - category: { ja: 'お受渡し', zh: '交车' }
      items:
        - label: { ja: 'お受渡し場所', zh: '交车地点' }
          notes:
            ja: '東京都内ホテル、または弊社駐車場のいずれか。'
            zh: '可在东京都内您下榻酒店,或我司停车场任选。'
        - label: { ja: '車両動作確認', zh: '车辆功能确认' }
          notes:
            ja: 'ナビ・ETC・ライト等の操作を弊社スタッフより 5 分程度のご案内。'
            zh: '导航 / ETC / 灯光等操作由我方 5 分钟简介。'
order: 2
