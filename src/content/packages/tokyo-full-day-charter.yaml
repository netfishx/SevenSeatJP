type: charter
title: { ja: '東京1日チャーター', zh: '东京整日包车' }
durations:
  - label: { ja: '半日 (4時間)', zh: '半日 4 小时' }
    hours: 4
    fares:
      - vehicle: alphard
        jpy: 38000
        includes: { ja: '市内100km以内', zh: '市内 100 公里以内' }
      - vehicle: vellfire
        jpy: 42000
        includes: { ja: '市内100km以内', zh: '市内 100 公里以内' }
  - label: { ja: '1日 (8時間)', zh: '整日 8 小时' }
    hours: 8
    fares:
      - vehicle: alphard
        jpy: 65000
        includes: { ja: '市内200km以内', zh: '市内 200 公里以内' }
      - vehicle: hiace
        jpy: 72000
        includes: { ja: '7名様まで・市内200km以内', zh: '最多 7 人·市内 200 公里以内' }
inclusions:
  - { ja: 'ガソリン代込み', zh: '含油费' }
  - { ja: '高速代込み(東京都内)', zh: '含高速费(东京都内)' }
  - { ja: 'プロドライバー', zh: '专业司机' }
notes:
  ja: '延長は1時間あたり 6,000 円(税込)'
  zh: '超时每小时 6,000 日元(含税)'
spine:
  type: itinerary
  items:
    - time: '08:00'
      place: { ja: '東京都内ご宿泊先', zh: '东京住宿地' }
      body:
        ja: 'ご出発。途中の高速 SA で軽くお休みできます。'
        zh: '出发。中途服务区可短暂休息。'
    - time: '10:30'
      place: { ja: '新倉山浅間公園(富士見展望台)', zh: '新仓山浅间公园(富士展望台)' }
      body:
        ja: '五重塔と富士の構図で知られるスポット。階段 398 段、徒歩 10 分の坂道があります。'
        zh: '以五重塔与富士同框闻名。共 398 阶,徒步 10 分钟坡道。'
    - time: '12:30'
      place: { ja: '河口湖畔ランチ', zh: '河口湖湖畔午餐' }
      body:
        ja: 'ほうとう・うなぎ等、湖畔の店舗でゆっくり。'
        zh: '可在湖畔店家品尝传统宝刀面或鳗鱼料理。'
    - time: '14:00'
      place: { ja: '河口湖一周', zh: '河口湖一周' }
      body:
        ja: '湖を時計回りで一周、ロープウェイや富士オリジナル小道を経由。'
        zh: '顺时针绕湖一圈,可经索道与富士急原野。'
    - time: '17:30'
      place: { ja: '東京帰着', zh: '返抵东京' }
      body:
        ja: '中央道 → 首都高経由でホテルまで。所要 8 時間の標準コース。'
        zh: '经中央道 → 首都高返回酒店。整套行程约 8 小时。'
order: 1
