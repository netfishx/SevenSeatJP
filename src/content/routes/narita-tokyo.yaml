category: airport
from: { ja: '成田国際空港', zh: '成田国际机场' }
to: { ja: '東京都内', zh: '东京都内' }
durationMin: 75
distanceKm: 70
fares:
  - vehicle: alphard
    jpy: 28000
    includes:
      ja: '高速代・駐車場代・運転手チップ込み'
      zh: '含高速费、停车费、司机服务费'
    notes:
      ja: '22:00〜翌5:00は深夜料金 +20%'
      zh: '22:00 至次日 5:00 加收 20% 夜间费'
  - vehicle: vellfire
    jpy: 30000
    includes:
      ja: '高速代・駐車場代込み'
      zh: '含高速费、停车费'
  - vehicle: hiace
    jpy: 32000
    includes:
      ja: '7名様まで・大型荷物対応'
      zh: '最多 7 人、大件行李'
spine:
  type: timeline
  items:
    - offset: 'T-2h'
      label: { ja: '搭乗予定 2 時間前', zh: '登机前 2 小时' }
      body:
        ja: '弊社にて航空便の到着予定をモニタリング開始。遅延・早着いずれの場合も追加料金なしで待機調整。'
        zh: '我们开始监控您的航班动态。无论延误或提前抵达,均无需额外费用调整等待时间。'
    - offset: 'T-30min'
      label: { ja: '到着 30 分前', zh: '抵达前 30 分' }
      body:
        ja: 'ドライバーが空港到着階に到着、専用看板を持ってお迎え準備。LINE / WeChat でリアルタイム位置をお知らせ可能。'
        zh: '司机抵达机场到达层,持专用接机牌待命。可通过 LINE / WeChat 实时同步位置。'
    - offset: 'T+0'
      label: { ja: 'お出迎え', zh: '接到您' }
      body:
        ja: '到着ロビーでお迎え後、お荷物を運搬、車両までご案内。日本語・中国語どちらでも対応。'
        zh: '在到达大厅接到您后,协助搬运行李、引导至专车。日中双语随意切换。'
order: 1
