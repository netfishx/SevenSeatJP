        ja: 'ドライバーが羽田到着階で待機、看板を持ってお迎え準備。'
        zh: '司机于羽田到达层待命,持牌迎接。'
    - offset: 'T+0'
      label: { ja: 'お出迎え', zh: '接到您' }
