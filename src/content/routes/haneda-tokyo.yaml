    jpy: 20000
    includes:
      ja: '高速代・駐車場代込み'
      zh: '含高速费、停车费'
spine:
  type: timeline
  items:
    - offset: 'T-90min'
      label: { ja: '搭乗予定 90 分前', zh: '登机前 90 分' }
      body:
        ja: '航空便の到着予定モニタリング開始。遅延・早着とも追加料金なし。'
        zh: '开始监控航班动态。无论延误或早抵均不收额外费用。'
    - offset: 'T-20min'
      label: { ja: '到着 20 分前', zh: '抵达前 20 分' }
